{% extends "base.html" %}

{% block content %}

<h2>Import Users</h2>

<form
    method="POST"
    enctype="multipart/form-data"
>

    <div class="mb-3">

        <label>Select CSV File</label>

        <input
            type="file"
            name="file"
            class="form-control"
            required
        >

    </div>

    <button
        type="submit"
        class="btn btn-primary"
    >
        Import Users
    </button>

</form>

{% endblock %}
