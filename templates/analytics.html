{% extends "base.html" %}

{% block content %}

<h2>Analytics Dashboard</h2>

<div class="row">

    <div class="col-md-6">
        <canvas id="pieChart"></canvas>
    </div>

    <div class="col-md-6">
        <canvas id="barChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const pieCtx = document.getElementById('pieChart');

new Chart(pieCtx, {

    type: 'pie',

    data: {

        labels: [
            'Positive',
            'Negative',
            'Neutral'
        ],

        datasets: [{

            data: [
                {{ positive_count }},
                {{ negative_count }},
                {{ neutral_count }}
            ]

        }]
    }
});

const barCtx = document.getElementById('barChart');

new Chart(barCtx, {

    type: 'bar',

    data: {

        labels: [
            'Positive',
            'Negative',
            'Neutral'
        ],

        datasets: [{

            label: 'Sentiment Count',

            data: [
                {{ positive_count }},
                {{ negative_count }},
                {{ neutral_count }}
            ]

        }]
    }
});

</script>

{% endblock %}
